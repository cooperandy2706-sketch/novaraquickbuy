name: Build Apps (Windows, Mac, Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'          # Capacitor CLI v8 requires Node >=22
    - run: npm install --legacy-peer-deps
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'   # capacitor.build.gradle requires VERSION_21
    - run: npx cap sync android
    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - run: pip install setuptools   # Restores distutils removed in Python 3.12 (needed by node-gyp)
    - run: npm install --legacy-peer-deps
    - run: npm run electron:build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-Windows-EXE
        path: dist/*.exe

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'   # GitHub-managed Python; pip has no PEP-668 restrictions
    - run: pip install setuptools
    - run: npm install --legacy-peer-deps
    - run: npm run electron:build:mac
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CSC_IDENTITY_AUTO_DISCOVERY: false
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-Mac-DMG
        path: dist/*.dmg
