name: Build Apps (Windows & Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - run: npx cap sync android
    - name: Build Android APK
      working-directory: ./android
      run: ./gradlew assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: npm run electron:build:win
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-Windows-EXE
        path: dist/*.exe

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: npm run electron:build:mac
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: Novara-Quickbuy-Mac-DMG
        path: dist/*.dmg
